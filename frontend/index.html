<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / App identity -->
    <title>Sapphire</title>
    <meta name="description" content="AI-powered workforce automation platform" />
    <meta name="application-name" content="Sapphire" />

    <!-- iOS Safari — makes it behave like a native app when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sapphire" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS splash screens (optional but makes launch feel native) -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme color — matches the dark UI -->
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="msapplication-TileColor" content="#0f0f0f" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
