name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/okekedev/sapphire-backend:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure registry access
        run: |
          az containerapp registry remove \
            --name ca-sapphire-prod \
            --resource-group rg-sapphire-prod \
            --server ghcr.io || echo "No existing registry config to remove"
          az containerapp registry set \
            --name ca-sapphire-prod \
            --resource-group rg-sapphire-prod \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GHCR_TOKEN }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ca-sapphire-prod \
            --resource-group rg-sapphire-prod \
            --image ghcr.io/okekedev/sapphire-backend:latest
